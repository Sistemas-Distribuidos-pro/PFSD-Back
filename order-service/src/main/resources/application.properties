# Configuración del Order Service
spring.application.name=order-service

# Puerto del servidor
server.port=${ORDER_SERVICE_PORT:8081}

# URLs de microservicios externos
services.auth.base-url=${AUTH_SERVICE_BASE_URL:http://localhost:${AUTH_SERVICE_PORT:8082}/api/users}
services.catalog.base-url=${CATALOG_SERVICE_BASE_URL:http://localhost:${CATALOG_SERVICE_PORT:8083}/api/products}

# Banner personalizado
spring.main.banner-mode=console

# Configuración de logging
logging.level.root=INFO
logging.level.com.monolito.ecommerce=DEBUG

# Mensajes más descriptivos en desarrollo
server.error.include-message=always
server.error.include-binding-errors=always

# JWT Configuration
auth.jwt.secret=${AUTH_JWT_SECRET:change-this-secret-key-to-at-least-32-bytes-long}
auth.jwt.expiration-seconds=${AUTH_JWT_EXPIRATION_SECONDS:3600}

# CORS Configuration (comma-separated list of allowed origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Kafka
# En producción sobreescribir con: KAFKA_BOOTSTRAP_SERVERS=kafka:9092
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.monolito.ecommerce.*

# Perfil activo por defecto (local arranca Kafka embebido)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Mail
# En producción sobreescribir con variables de entorno reales
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
alerts.email.destinatario=${ALERTS_EMAIL:admin@ecommerce.com}

