spring.application.name=catalog-service
server.port=${CATALOG_SERVICE_PORT:8083}

logging.level.root=INFO
logging.level.com.microecommerce.catalog=DEBUG

server.error.include-message=always
server.error.include-binding-errors=always

# JWT Configuration
auth.jwt.secret=${AUTH_JWT_SECRET:change-this-secret-key-to-at-least-32-bytes-long}
auth.jwt.expiration-seconds=${AUTH_JWT_EXPIRATION_SECONDS:3600}

# CORS Configuration (comma-separated list of allowed origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
